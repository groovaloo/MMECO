name: Compilar Moral Money Node (Docker)

on:
  push:
    branches: [ "main", "vps-updates" ]
  pull_request:
    branches: [ "main", "vps-updates" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Compilar nó em contentor Docker (Rust)
      run: |
        docker run --rm \
        -v ${{ github.workspace }}:/app \
        -w /app \
        rust:latest \
        /bin/bash -c "apt-get update && apt-get install -y clang curl libssl-dev llvm libudev-dev make protobuf-compiler && rustup target add wasm32-unknown-unknown && cargo build --release"
