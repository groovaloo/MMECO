name: Compilar Moral Money Node

on:
  push:
    branches: ["**"]  # 🚀 Agora funciona em TODAS as branches automaticamente
  pull_request:
    branches: ["**"]
  workflow_dispatch: # 🖲️ Mantém o teu botão manual

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
        
      - name: Instalar Dependências do Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config clang libclang-dev curl libssl-dev llvm libudev-dev make protobuf-compiler cmake autoconf automake libtool
          
      - name: Instalar Rust 1.88
        run: |
          rustup install 1.88.0
          rustup default 1.88.0
          rustup target add wasm32-unknown-unknown
          rustup component add rust-src
          
      - name: Compilar Node (Build Completo)
        run: |
          cd blockchain-core
          
          # Limpeza de segurança para evitar conflitos de cache
          rm -f rust-toolchain.toml rust-toolchain Cargo.lock
          
          # Atualizar dependências para garantir que lê os teus novos Cargo.toml
          cargo update
          
          # Definir o caminho do Clang (essencial para o Substrate)
          export LIBCLANG_PATH=$(llvm-config --libdir)
          
          # Compilar apenas o nó principal
          cargo build --release -p mmeco-node
          
      - name: Guardar Binário
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mmeco-node-final
          path: blockchain-core/target/release/mmeco-node
