name: Compilar Moral Money Node
on:
  workflow_dispatch:
  push:
    branches: [ rebuild-2025.2 ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
      
      - name: Instalar Rust Toolchain Correto
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2024-09-24
          targets: wasm32-unknown-unknown
          components: rust-src
      
      - name: Instalar Dependências de Sistema
        run: |
          sudo apt-get update && sudo apt-get install -y clang curl libssl-dev llvm libudev-dev make protobuf-compiler
      
      - name: Compilar Node (Build Completo com WASM)
        run: |
          cd blockchain-core
          cargo update -p blake2s_simd --precise 1.0.2 || true
          cargo update -p blake2b_simd --precise 1.0.2 || true
          cargo build --release -p mmeco-node
      
      - name: Guardar Binário
        uses: actions/upload-artifact@v4
        with:
          name: mmeco-node-final
          path: blockchain-core/target/release/mmeco-node
