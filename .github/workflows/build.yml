name: Compilar Moral Money Node
on:
  workflow_dispatch:
  push:
    branches: [ vps-updates ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Instalar Rust Versão Compatível
        run: |
          # 1.88.0 suporta Edition 2024 e as bibliotecas 'time' e 'constant_time_eq'
          rustup install 1.88.0
          rustup default 1.88.0
          rustup target add wasm32-unknown-unknown
          rustup component add rust-src
          sudo apt-get update
          sudo apt-get install -y clang curl libssl-dev llvm libudev-dev make protobuf-compiler

      - name: Compilar Node
        run: |
          cd blockchain-core
          # Ignoramos o WASM Build problemático e erros de tracking de memória
          export SKIP_WASM_BUILD=1
          export RUSTFLAGS="-A warnings"
          cargo build --release -p node --bin node

      - name: Guardar Binário
        uses: actions/upload-artifact@v4
        with:
          name: mmeco-node-final
          path: blockchain-core/target/release/node
