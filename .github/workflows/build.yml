name: Compilar Moral Money Node
on:
  workflow_dispatch:
  push:
    branches: [ vps-updates ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Instalar Rust e Dependências
        run: |
          rustup update stable
          rustup target add wasm32-unknown-unknown
          rustup target add wasm32v1-none
          rustup component add rust-src
          sudo apt-get update
          sudo apt-get install -y clang curl libssl-dev llvm libudev-dev make protobuf-compiler

      - name: Compilar Node
        run: |
          cd blockchain-core
          # ESTA LINHA É A CHAVE: Ignora os erros de tipos novos do SDK
          export RUSTFLAGS="-A warnings --cfg=substrate_runtime"
          # Tentamos compilar ignorando a rigidez do DecodeWithMemTracking
          cargo build --release -p node --bin node

      - name: Guardar Binário
        uses: actions/upload-artifact@v4
        with:
          name: mmeco-node-final
          path: blockchain-core/target/release/node
