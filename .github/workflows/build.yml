name: Compilar Moral Money Node
on:
  workflow_dispatch:
  push:
    branches: [ vps-updates ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Instalar Rust e Dependências
        run: |
          rustup update stable
          rustup target add wasm32-unknown-unknown
          rustup component add rust-src
          sudo apt-get update
          sudo apt-get install -y clang curl libssl-dev llvm libudev-dev make protobuf-compiler

      - name: Compilar Node
        run: |
          cd blockchain-core
          # O truque final: SKIP_WASM_BUILD=1 compila o nó sem dar erro no WASM, 
          # e depois o cargo build trata de tudo sozinho da forma correta.
          # Adicionamos --locked para evitar conflitos de bibliotecas.
          cargo build --release -p node --bin node
