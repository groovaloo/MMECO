name: Compilar Moral Money Node
on:
  workflow_dispatch:
  push:
    branches: [ vps-updates ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Instalar Rust e Novas Targets
        run: |
          rustup update stable
          # Instalamos as duas targets para garantir compatibilidade
          rustup target add wasm32-unknown-unknown
          rustup target add wasm32v1-none
          rustup component add rust-src
          sudo apt-get update
          sudo apt-get install -y clang curl libssl-dev llvm libudev-dev make protobuf-compiler

      - name: Compilar Node
        run: |
          cd blockchain-core
          # Adicionamos uma flag para evitar o erro de duplicados no WASM
          export SKIP_WASM_BUILD=
          cargo build --release -p node --bin node

      - name: Guardar Binário
        uses: actions/upload-artifact@v4
        with:
          name: mmeco-node-final
          path: blockchain-core/target/release/node
