[package]
name = "mmeco-runtime"
version = "0.1.0"
edition = "2021"

[dependencies]
polkadot-sdk = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2503", default-features = false, features = [
    "frame-executive",
    "frame-support",
    "frame-system",
    "frame-system-rpc-runtime-api",
    "pallet-aura",
    "pallet-balances",
    "pallet-grandpa",
    "pallet-sudo",
    "pallet-timestamp",
    "pallet-transaction-payment",
    "pallet-transaction-payment-rpc-runtime-api",
    "sp-api",
    "sp-block-builder",
    "sp-consensus-aura",
    "sp-consensus-grandpa",
    "sp-core",
    "sp-genesis-builder",
    "sp-inherents",
    "sp-offchain",
    "sp-runtime",
    "sp-session",
    "sp-std",
    "sp-transaction-pool",
    "sp-version",
    "substrate-wasm-builder",
] }

reputation = { path = "../pallets/reputation", default-features = false }
pallet-projects = { path = "../pallets/projects", default-features = false }
pallet-governance = { path = "../pallets/governance", default-features = false }

[build-dependencies]
polkadot-sdk = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2503", features = ["substrate-wasm-builder"] }

[features]
default = ["std"]
std = [
    "polkadot-sdk/std",
    "reputation/std",
    "pallet-projects/std",
    "pallet-governance/std",
]
