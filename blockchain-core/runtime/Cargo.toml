[package]
name = "mmeco-runtime"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
# Motor principal centralizado no workspace
polkadot-sdk = { workspace = true, features = ["runtime"] }
# Codificação base
codec = { package = "parity-scale-codec", version = "3.6.1", default-features = false, features = ["derive"] }
scale-info = { version = "2.10.0", default-features = false, features = ["derive"] }

# As tuas paletes personalizadas (NOMES CORRETOS AQUI!)
pallet-reputation = { path = "../pallets/reputation", default-features = false }
pallet-projects = { path = "../pallets/projects", default-features = false }
pallet-governance = { path = "../pallets/governance", default-features = false }

[build-dependencies]
substrate-build-script-utils = { workspace = true }

[features]
default = ["std"]
std = [
    "codec/std",
    "scale-info/std",
    "polkadot-sdk/std",
    "pallet-reputation/std",
    "pallet-projects/std",
    "pallet-governance/std",
]
runtime-benchmarks = [
	"polkadot-sdk/runtime-benchmarks",
	"pallet-reputation/runtime-benchmarks",
]
try-runtime = [
	"polkadot-sdk/try-runtime",
	"pallet-reputation/try-runtime",
]
