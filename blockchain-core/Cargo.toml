[workspace]
resolver = "2"

members = [
    "node",
    "runtime",
    "pallets/governance",
    "pallets/projects",
    "pallets/reputation",
]

[workspace.package]
authors = ["Moral Money Team"]
edition = "2021"
repository = "https://github.com/nuno/mmeco"

[workspace.dependencies]
# Versão estável do SDK para 2025
polkadot-sdk = { git = "https://github.com/paritytech/polkadot-sdk", tag = "stable2409", default-features = false }

# Dependências comuns
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false }
scale-info = { version = "2.10", default-features = false, features = ["derive"] }
parity-scale-codec = { version = "3.6", default-features = false, features = ["derive"] }
hex-literal = "0.4.1"
clap = { version = "4.4", features = ["derive"] }
anyhow = "1.0"
jsonrpsee = { version = "0.20", features = ["server", "macros"] }
tokio = { version = "1.36", features = ["full"] }

[profile.release]
panic = "unwind"
opt-level = 3
lto = "fat"
codegen-units = 1
