[package]
name = "node"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4.4.10", features = ["derive"] }
futures = "0.3.30"
serde = { version = "1.0.193", features = ["derive"] }
hyper = { version = "0.14.32", features = ["full"] }

# Versões do Polkadot SDK v1.1.0 (estáveis e corrigidas)
sc-cli = "0.36.0"
sc-service = "0.35.0"
sc-network = "0.34.0"
sc-rpc-server = "15.0.0"
sp-core = "28.0.0"
sp-runtime = "30.0.0"
sp-api = "26.0.0"

# O segredo: forçar a sp-api-proc-macro a ser compatível
sp-api-proc-macro = "14.0.0"

runtime = { path = "../runtime" }

[build-dependencies]
substrate-build-script-utils = "11.0.0"
