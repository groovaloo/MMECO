[package]
name = "node"
version = "0.1.0"
edition = "2021"

[dependencies]
# CLI simples
clap = { version = "4.0", features = ["derive"] }

# Ligação direta aos teus Pallets (Opus 4.6)
reputation = { path = "../pallets/reputation" }
pallet-projects = { path = "../pallets/projects" }
pallet-governance = { path = "../pallets/governance" }

# Motor de comunicação LEVE (Versões estáveis para o teu Mac)
jsonrpsee = { version = "0.24", features = ["server", "macros"] }
tokio = { version = "1.36", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Utilitários essenciais do Substrate
sp-core = "28.0.0"
sp-keyring = "31.0.0"
anyhow = "1.0.102"
